version: "3"

tasks:
  lint:
    desc: Run ESLint on repository TypeScript sources
    cmds:
      - npm run lint

  typecheck:
    desc: Typecheck repository TypeScript sources
    cmds:
      - npm run typecheck

  format:
    desc: Format repository files with Prettier
    cmds:
      - npm run format

  format-check:
    desc: Check repository formatting with Prettier
    cmds:
      - npm run format:check

  test:
    desc: Run the repository test suite
    cmds:
      - npm run test

  web:dev:
    desc: Start the web app development server
    cmds:
      - npm --prefix packages/web run dev

  test:e2e:
    desc: Run web E2E tests
    cmds:
      - npm run test:e2e

  check:
    desc: Run lint, typecheck, and tests
    cmds:
      - npm run check

  precommit:
    desc: Enable git pre-commit hooks
    cmds:
      - pre-commit install
