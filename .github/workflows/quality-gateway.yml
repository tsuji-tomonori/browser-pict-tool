name: Quality Gateway

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: quality-gateway-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Repository Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Core test suite (without upstream .work fixtures)
        id: core_tests
        continue-on-error: true
        run: |
          set -euo pipefail
          mapfile -t TEST_FILES < <(find tests/core -maxdepth 1 -name '*.test.ts' ! -name 'upstream-pict-fixtures.test.ts' | sort)
          node --experimental-strip-types --test "${TEST_FILES[@]}"

      - name: Required v0.1 QA gate
        id: qa_gate
        continue-on-error: true
        run: npm run test:qa

      - name: Fixture integrity check
        id: fixture_integrity
        continue-on-error: true
        run: node --experimental-strip-types scripts/check-fixture-integrity.ts

      - name: Generate feature coverage report
        id: feature_coverage
        continue-on-error: true
        run: node --experimental-strip-types scripts/check-feature-coverage.ts

      - name: Assert required_v0_1 fixture coverage
        id: required_fixture_coverage
        continue-on-error: true
        run: >-
          node --experimental-strip-types -e
          "const fs=require('node:fs');
          const report=JSON.parse(fs.readFileSync('tests/generated/feature-coverage.json','utf8'));
          const required=report?.phaseCoverage?.required_v0_1;
          if(!required){throw new Error('required_v0_1 coverage is missing in feature-coverage.json');}
          if(required.missingFixtureCases!==0){
            throw new Error('required_v0_1 has missing fixtures: '+required.missingFixtureCases);
          }
          console.log('required_v0_1 coverage is complete');"

      - name: Upload feature coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-coverage
          path: tests/generated/feature-coverage.json
          if-no-files-found: warn

      - name: Comment quality results on PR
        if: >-
          always() &&
          github.event_name == 'pull_request' &&
          !github.event.pull_request.head.repo.fork
        uses: actions/github-script@v7
        env:
          LINT_OUTCOME: ${{ steps.lint.outcome }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          CORE_TESTS_OUTCOME: ${{ steps.core_tests.outcome }}
          QA_GATE_OUTCOME: ${{ steps.qa_gate.outcome }}
          FIXTURE_INTEGRITY_OUTCOME: ${{ steps.fixture_integrity.outcome }}
          FEATURE_COVERAGE_OUTCOME: ${{ steps.feature_coverage.outcome }}
          REQUIRED_FIXTURE_COVERAGE_OUTCOME: ${{ steps.required_fixture_coverage.outcome }}
        with:
          script: |
            const statuses = [
              ['Lint', process.env.LINT_OUTCOME],
              ['Typecheck', process.env.TYPECHECK_OUTCOME],
              ['Core Tests', process.env.CORE_TESTS_OUTCOME],
              ['QA Gate', process.env.QA_GATE_OUTCOME],
              ['Fixture Integrity', process.env.FIXTURE_INTEGRITY_OUTCOME],
              ['Feature Coverage', process.env.FEATURE_COVERAGE_OUTCOME],
              ['Required Fixture Coverage', process.env.REQUIRED_FIXTURE_COVERAGE_OUTCOME],
            ];

            const iconFor = (outcome) => {
              if (outcome === 'success') return '✅';
              if (outcome === 'failure') return '❌';
              if (outcome === 'cancelled') return '🚫';
              return '⚠️';
            };

            const allPassed = statuses.every(([, outcome]) => outcome === 'success');
            const summary = allPassed
              ? '✅ Quality checks passed.'
              : '❌ One or more quality checks failed.';
            const rows = statuses
              .map(([name, outcome]) => `| ${iconFor(outcome)} ${name} | \`${outcome ?? 'skipped'}\` |`)
              .join('\n');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '<!-- quality-gateway-report -->',
              `## Quality Gateway Report`,
              '',
              `${summary}`,
              '',
              '| Check | Result |',
              '| --- | --- |',
              rows,
              '',
              `🔎 [View full workflow logs](${runUrl})`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const previous = comments.find((comment) =>
              comment.user?.type === 'Bot' &&
              comment.body?.includes('<!-- quality-gateway-report -->')
            );
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Enforce quality gate
        if: always()
        run: |
          set -euo pipefail
          outcomes=(
            "${{ steps.lint.outcome }}"
            "${{ steps.typecheck.outcome }}"
            "${{ steps.core_tests.outcome }}"
            "${{ steps.qa_gate.outcome }}"
            "${{ steps.fixture_integrity.outcome }}"
            "${{ steps.feature_coverage.outcome }}"
            "${{ steps.required_fixture_coverage.outcome }}"
          )
          for outcome in "${outcomes[@]}"; do
            if [[ "$outcome" != "success" ]]; then
              echo "Quality gate failed: at least one check result is $outcome"
              exit 1
            fi
          done
